<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0071e3"/>
      <stop offset="50%" stop-color="#34c759"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
    <line x1="400" y1="0" x2="400" y2="300" />
    <line x1="500" y1="0" x2="500" y2="300" />
    <line x1="600" y1="0" x2="600" y2="300" />
    <line x1="700" y1="0" x2="700" y2="300" />
  </g>

  <!-- Abstract Pipeline Paths -->
  <path d="M 50 150 C 150 150, 200 50, 300 50 S 450 250, 550 250 S 650 150, 750 150" fill="none" stroke="url(#lineGrad)" stroke-width="3" filter="url(#glow)"/>
  
  <path d="M 50 200 C 250 200, 300 80, 450 80 S 550 200, 750 200" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <path d="M 50 100 C 200 100, 250 220, 400 220 S 600 100, 750 100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  
  <!-- Nodes -->
  <circle cx="300" cy="50" r="5" fill="#fff" filter="url(#glow)"/>
  <circle cx="550" cy="250" r="5" fill="#fff" filter="url(#glow)"/>
  <circle cx="450" cy="80" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="400" cy="220" r="4" fill="rgba(255,255,255,0.6)"/>
  
  <text x="50%" y="130" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="34" fill="#ffffff" text-anchor="middle" letter-spacing="-1">JOB HUNT PIPELINE</text>
  <text x="50%" y="170" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="300" font-size="14" fill="#86868b" text-anchor="middle" letter-spacing="4">SYSTEMATIC CAREER ENGINEERING</text>
</svg>
