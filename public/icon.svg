<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0071e3"/>
      <stop offset="100%" stop-color="#34c759"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0c0c0e"/>
  
  <!-- Subtle diagonal link pipeline -->
  <path d="M 24 76 L 76 24" stroke="rgba(255,255,255,0.15)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Center Main Node -->
  <circle cx="50" cy="50" r="20" fill="#0c0c0e" stroke="url(#ringGrad)" stroke-width="6" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="6" fill="#ffffff"/>
  
  <!-- Outer Connector Nodes -->
  <circle cx="24" cy="76" r="4" fill="#34c759" filter="url(#glow)"/>
  <circle cx="76" cy="24" r="4" fill="#f5a623" filter="url(#glow)"/>
</svg>
